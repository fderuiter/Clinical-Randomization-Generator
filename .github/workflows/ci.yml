name: CI Workflow

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  linting:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        
    - name: Set up R
      uses: r-lib/actions/setup-r@v2
      with:
        r-version: 'release'
        
    - name: Python Linting
      run: |
        pip install flake8
        flake8 --max-line-length=120 scripts/cross-env/verify_python_schema.py verification.py
        
    - name: R Linting
      run: |
        Rscript -e "install.packages('lintr')"
        Rscript -e "if(length(lintr::lint('scripts/cross-env/verify_r_schema.R')) > 0) quit(status=1)"
        
  setup:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        run_install: false

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'
        cache: 'pnpm'

    - name: Install Dependencies
      run: pnpm install --frozen-lockfile

    - name: Build Project
      run: pnpm run build

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
      env:
        PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/pw-browsers

    - name: Run Unit Tests
      run: pnpm test -- --watch=false

    - name: Run Linting
      run: pnpm run lint

    - name: Archive environment
      run: tar -cf shared-env.tar node_modules pw-browsers dist

    - name: Upload shared environment
      uses: actions/upload-artifact@v7
      with:
        name: shared-env
        path: shared-env.tar
        retention-days: 1

  e2e:
    runs-on: ubuntu-latest
    needs: setup
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'

    - name: Download shared environment
      uses: actions/download-artifact@v8
      with:
        name: shared-env
        path: .

    - name: Extract shared environment
      run: tar -xf shared-env.tar

    - name: Run E2E Tests (Shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
      run: npx playwright test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
      env:
        CI: true
        PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/pw-browsers

    - name: Upload blob report
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: blob-report-${{ matrix.shardIndex }}
        path: blob-report/
        retention-days: 1

  code_generation_fixtures:
    runs-on: ubuntu-latest
    needs: setup
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Set up R
      uses: r-lib/actions/setup-r@v2
      with:
        r-version: 'release'

    - name: Install Python dependencies for generated scripts
      run: pip install numpy pandas --quiet

    - name: Download shared environment
      uses: actions/download-artifact@v8
      with:
        name: shared-env
        path: .

    - name: Extract shared environment
      run: tar -xf shared-env.tar

    - name: Export code-generation fixture scripts
      run: npx playwright test tests_e2e/code-generation-fixture.spec.ts
      env:
        CI: true
        CODEGEN_FIXTURES: '1'
        PYTHON: python3
        PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/pw-browsers

    - name: Upload code-generation fixture scripts
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: code-generation-fixtures
        path: artifacts/code-generation-fixtures/
        retention-days: 30

  python_script_execution_check:
    runs-on: ubuntu-latest
    needs: code_generation_fixtures
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      run: pip install numpy pandas --quiet

    - name: Download code-generation fixture scripts
      uses: actions/download-artifact@v8
      with:
        name: code-generation-fixtures
        path: artifacts/code-generation-fixtures/

    - name: Execute generated Python scripts
      run: |
        set -e
        PASS=0
        FAIL=0
        ERRORS=""
        echo "=== Running UI-generated Python scripts ==="
        while IFS= read -r -d '' script; do
          echo ""
          echo "--- Running: $script ---"
          if python3 "$script"; then
            echo "PASS: $script"
            PASS=$((PASS + 1))
          else
            echo "FAIL: $script"
            FAIL=$((FAIL + 1))
            ERRORS="$ERRORS\n  ✗ $script"
          fi
        done < <(find artifacts/code-generation-fixtures -name '*.py' -print0 | sort -z)
        echo ""
        echo "=== Python Script Execution Summary ==="
        echo "  Passed: $PASS"
        echo "  Failed: $FAIL"
        if [ "$FAIL" -gt 0 ]; then
          echo ""
          echo "FAILED scripts:"
          printf "$ERRORS\n"
          exit 1
        fi
        if [ "$PASS" -eq 0 ]; then
          echo "ERROR: No Python scripts found in artifacts/code-generation-fixtures/"
          exit 1
        fi
        echo "All $PASS generated Python script(s) executed successfully."

  sas_static_validation:
    runs-on: ubuntu-latest
    needs: code_generation_fixtures
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'

    - name: Download shared environment
      uses: actions/download-artifact@v8
      with:
        name: shared-env
        path: .

    - name: Extract shared environment
      run: tar -xf shared-env.tar

    - name: Download code-generation fixture scripts
      uses: actions/download-artifact@v8
      with:
        name: code-generation-fixtures
        path: artifacts/code-generation-fixtures/

    - name: Run SAS static syntax validator
      run: node scripts/validate-sas-syntax.mjs

  stata_static_validation:
    runs-on: ubuntu-latest
    needs: code_generation_fixtures
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'
        cache: 'pnpm'

    - name: Download code-generation fixture scripts
      uses: actions/download-artifact@v8
      with:
        name: code-generation-fixtures
        path: artifacts/code-generation-fixtures/

    - name: Run Stata static syntax validator
      run: node scripts/validate-stata-syntax.mjs

  merge_reports:
    runs-on: ubuntu-latest
    needs: e2e
    if: always()
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'

    - name: Download shared environment
      uses: actions/download-artifact@v8
      with:
        name: shared-env
        path: .

    - name: Extract shared environment
      run: tar -xf shared-env.tar

    - name: Download all blob reports
      uses: actions/download-artifact@v8
      with:
        path: all-blob-reports
        pattern: blob-report-*
        merge-multiple: true

    - name: Merge Playwright reports
      run: |
        npx playwright merge-reports --reporter html ./all-blob-reports
        mkdir -p playwright-report
        npx playwright merge-reports --reporter json ./all-blob-reports > playwright-report/report.json

    - name: Upload merged HTML report
      uses: actions/upload-artifact@v7
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

  traceability_matrix:
    runs-on: ubuntu-latest
    needs: [setup, merge_reports]
    if: always()
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'

    - name: Download shared environment
      uses: actions/download-artifact@v8
      with:
        name: shared-env
        path: .

    - name: Extract shared environment
      run: tar -xf shared-env.tar

    - name: Run unit tests with JSON reporter
      run: |
        node generate-version.js
        ./node_modules/.bin/vitest run \
          --exclude 'tests_e2e/**' \
          --reporter=json \
          --outputFile=vitest-results.json || true

    - name: Download Playwright JSON report
      uses: actions/download-artifact@v8
      with:
        name: playwright-report
        path: playwright-report/
      continue-on-error: true

    - name: Generate Validation Traceability Matrix
      run: |
        VITEST_ARG=""
        PW_ARG=""
        if [ -f vitest-results.json ]; then
          VITEST_ARG="--vitest-results vitest-results.json"
        fi
        if [ -f playwright-report/report.json ]; then
          PW_ARG="--playwright-results playwright-report/report.json"
        fi
        node scripts/generate-rtm.mjs $VITEST_ARG $PW_ARG \
          --out Validation_Traceability_Matrix.md
        echo "=== Traceability Matrix (first 50 lines) ==="
        head -50 Validation_Traceability_Matrix.md

    - name: Upload Validation Traceability Matrix
      uses: actions/upload-artifact@v7
      with:
        name: validation-traceability-matrix
        path: Validation_Traceability_Matrix.md
        retention-days: 90

  script_validation_report:
    runs-on: ubuntu-latest
    needs: [python_script_execution_check, sas_static_validation, stata_static_validation, cross_env_equivalence]
    if: always()
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'

    - name: Download shared environment
      uses: actions/download-artifact@v8
      with:
        name: shared-env
        path: .

    - name: Extract shared environment
      run: tar -xf shared-env.tar

    - name: Download code-generation fixture scripts
      uses: actions/download-artifact@v8
      with:
        name: code-generation-fixtures
        path: artifacts/code-generation-fixtures/
      continue-on-error: true

    - name: Generate script validation report
      run: |
        node scripts/generate-script-validation-report.mjs \
          --python-result "${{ needs.python_script_execution_check.result }}" \
          --r-result      "${{ needs.cross_env_equivalence.result }}" \
          --sas-result    "${{ needs.sas_static_validation.result }}" \
          --stata-result  "${{ needs.stata_static_validation.result }}" \
          --fixture-root  artifacts/code-generation-fixtures \
          --out           script-validation-report.md
        echo "=== Script Validation Report (preview) ==="
        head -40 script-validation-report.md

    - name: Upload script validation report
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: script-validation-report
        path: script-validation-report.md
        retention-days: 90

  cross_env_equivalence:
    runs-on: ubuntu-latest
    needs: [setup, code_generation_fixtures]
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Set up R
      uses: r-lib/actions/setup-r@v2
      with:
        r-version: 'release'

    - name: Install Python dependencies
      run: pip install numpy --quiet

    - name: Download code-generation fixture scripts
      uses: actions/download-artifact@v8
      with:
        name: code-generation-fixtures
        path: artifacts/code-generation-fixtures/

    - name: Python Cross-Environment Equivalence Check
      run: |
        echo "Running Python cross-environment equivalence fixture..."
        python3 scripts/cross-env/verify_python_schema.py
        echo "Python equivalence check completed."

    - name: R Cross-Environment Equivalence Check
      run: |
        echo "Running R cross-environment equivalence fixture and generated-script execution checks..."
        Rscript scripts/cross-env/verify_r_schema.R artifacts/code-generation-fixtures
        echo "R equivalence and generated-script checks completed."

  sbom:
    runs-on: ubuntu-latest
    needs: setup
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'

    - name: Download shared environment
      uses: actions/download-artifact@v8
      with:
        name: shared-env
        path: .

    - name: Extract shared environment
      run: tar -xf shared-env.tar

    - name: Generate Software Bill of Materials (SBOM)
      run: |
        echo "Generating CycloneDX SBOM for supply chain audit..."
        npx --yes @cyclonedx/cdxgen \
          -t nodejs \
          -o sbom.json
        echo "SBOM generated successfully."
        echo "Total components: $(cat sbom.json | python3 -c 'import json,sys; d=json.load(sys.stdin); print(len(d.get(\"components\", [])))')"

    - name: Upload SBOM artifact
      uses: actions/upload-artifact@v7
      with:
        name: sbom
        path: sbom.json
        retention-days: 90

  security_scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Check for insecure Math.random() in randomization domain
      run: |
        echo "Scanning for Math.random() usage in randomization-engine..."
        if grep -rn "Math\.random()" src/app/domain/randomization-engine/; then
          echo "ERROR: Math.random() detected in randomization-engine domain."
          echo "Use seedrandom or the Web Crypto API (crypto.getRandomValues) instead."
          exit 1
        fi
        echo "No insecure Math.random() found in randomization domain."
