name: Release Hardening
description: Report tasks needed for release readiness
title: "[Release Hardening]: "
labels: ["release-hardening"]
body:
  - type: dropdown
    id: type
    attributes:
      label: Type
      description: What type of issue is this?
      options:
        - Release Hardening
        - Bug
        - Feature
        - Test Gap
        - Refactor / Tech Debt
      default: 0
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which area does this issue affect?
      options:
        - UI/UX
        - Backend/API
        - Documentation
        - Core Algorithm
        - Build/Infrastructure
        - Other
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What is the expected behavior for the release?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior / Gap
      description: What is the current behavior or what remains to be hardened?
    validations:
      required: true
  - type: textarea
    id: criteria
    attributes:
      label: Acceptance Criteria
      description: What needs to be done for this issue to be considered resolved?
    validations:
      required: true
  - type: textarea
    id: test-plan
    attributes:
      label: Test Plan
      description: How will this change be tested?
    validations:
      required: true
