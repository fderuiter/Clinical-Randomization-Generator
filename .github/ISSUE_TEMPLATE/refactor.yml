name: Refactor / Tech Debt
description: Suggest code improvements and cleanup
title: "[Refactor]: "
labels: ["refactor"]
body:
  - type: dropdown
    id: type
    attributes:
      label: Type
      description: What type of issue is this?
      options:
        - Refactor / Tech Debt
        - Bug
        - Feature
        - Test Gap
        - Release Hardening
      default: 0
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which area does this issue affect?
      options:
        - UI/UX
        - Backend/API
        - Documentation
        - Core Algorithm
        - Build/Infrastructure
        - Other
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should the code look/act like after the refactor?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior / Gap
      description: What is the current state of the code or the technical debt?
    validations:
      required: true
  - type: textarea
    id: criteria
    attributes:
      label: Acceptance Criteria
      description: What needs to be done for this issue to be considered resolved?
    validations:
      required: true
  - type: textarea
    id: test-plan
    attributes:
      label: Test Plan
      description: How will this change be tested?
    validations:
      required: true
