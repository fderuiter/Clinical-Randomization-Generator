rules:
  - id: insecure-math-random
    message: "Use seedrandom or the Web Crypto API (crypto.getRandomValues) instead of Math.random()."
    severity: ERROR
    languages:
      - typescript
      - javascript
    pattern: Math.random()
    paths:
      exclude:
        - "**/*.spec.ts"
        - "**/tests_e2e/**"

  - id: insecure-python-random
    message: "Use np.random.default_rng(seed) instead of standard random library for clinical scripts."
    severity: ERROR
    languages:
      - python
    patterns:
      - pattern-either:
          - pattern: random.random(...)
          - pattern: random.randint(...)
          - pattern: random.choice(...)
          - pattern: np.random.rand(...)
    paths:
      exclude:
        - "**/scripts/cross-env/verify_python_schema.py"

  - id: insecure-r-sample-no-seed
    message: "Randomization functions in R must be seeded for clinical reproducibility."
    severity: ERROR
    languages:
      - r
    patterns:
      - pattern: sample(...)
      - pattern-not-inside: |
          set.seed(...)
          ...
          sample(...)
    paths:
      exclude:
        - "**/scripts/cross-env/verify_r_schema.R"

  - id: insecure-sas-ranuni
    message: "Do not use the deprecated 'ranuni' function in SAS templates. Use 'call streaminit' and 'rand' instead."
    severity: ERROR
    languages:
      - typescript
    patterns:
      - pattern-regex: "(?i)ranuni"
    paths:
      include:
        - "**/src/app/domain/schema-management/services/code-generator.service.ts"
